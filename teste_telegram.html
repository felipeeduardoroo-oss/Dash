<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔬 Teste - Funding Rate BTC</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <style>
    body { font-family: system-ui, sans-serif; padding: 20px; background: #f5f7fb; }
    h1 { color: #1e1e2f; }
    button { background: #4f46e5; color: white; border: none; padding: 12px 30px; border-radius: 30px; font-size: 1rem; font-weight: bold; cursor: pointer; }
    button:hover { background: #4338ca; }
    #output { 
      background: #1e1e2a; 
      color: #cdd6e0; 
      padding: 20px; 
      border-radius: 12px; 
      max-height: 600px; 
      overflow: auto; 
      white-space: pre-wrap; 
      font-family: 'Courier New', monospace; 
      font-size: 0.85rem; 
      margin-top: 20px;
      border: 1px solid #333;
    }
    .ok { color: #a6e3a1; }
    .err { color: #f38ba8; }
  </style>
</head>
<body>

  <h1>🔬 Teste de Conectividade - Funding Rate</h1>
  <p>Este teste busca os <strong>últimos 1000 registros</strong> de Funding Rate do BTCUSDT diretamente da API da Binance.</p>
  <button id="loadBtn">📥 Carregar Dados</button>
  <div id="output">Clique no botão para iniciar o teste...</div>

  <script>
    document.getElementById('loadBtn').addEventListener('click', async function() {
      const output = document.getElementById('output');
      output.textContent = '⏳ Conectando à API da Binance...';

      // URL SIMPLES: sem paginação, apenas os 1000 registros mais recentes
      const url = 'https://fapi.binance.com/fapi/v1/fundingRate?symbol=BTCUSDT&limit=1000';

      try {
        // 1. Faz a requisição
        const response = await fetch(url);
        
        // 2. Verifica se a resposta é ok
        if (!response.ok) {
          throw new Error(`HTTP Error: ${response.status} - ${response.statusText}`);
        }

        // 3. Converte para JSON
        const data = await response.json();

        // 4. Verifica se veio dados
        if (!data || data.length === 0) {
          output.textContent = '❌ Nenhum dado encontrado.';
          return;
        }

        // 5. Exibe o resultado no formato texto
        let texto = `✅ SUCESSO! Foram carregados ${data.length} registros.\n\n`;
        texto += `📊 ÚLTIMOS 10 REGISTROS (do mais recente para o mais antigo):\n`;
        texto += `--------------------------------------------------\n`;
        
        // Mostra os 10 primeiros (que são os mais recentes)
        const exibir = data.slice(0, 10);
        exibir.forEach((item, index) => {
          const dataHora = new Date(item.fundingTime).toLocaleString('pt-BR');
          const taxa = (parseFloat(item.fundingRate) * 100).toFixed(4);
          texto += `${index+1}. Data: ${dataHora} | Taxa: ${taxa}% | Preço Mark: $${parseFloat(item.markPrice).toFixed(2)}\n`;
        });

        texto += `\n💡 Dica: Se você viu esta lista, a API FUNCIONA! Agora podemos expandir para os outros indicadores.`;
        output.textContent = texto;

        // Também exibe no console do F12 para debug
        console.log('✅ Dados brutos carregados (primeiros 10):', data.slice(0, 10));

      } catch (erro) {
        // Qualquer erro (rede, CORS, timeout) cai aqui
        output.textContent = `❌ ERRO NA REQUISIÇÃO:\n${erro.message}\n\nVerifique sua conexão com a internet e tente novamente.`;
        console.error('Erro detalhado:', erro);
      }
    });
  </script>

</body>
</html>
